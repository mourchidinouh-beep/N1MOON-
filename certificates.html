<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background-color: #f4f4f4; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Arial', sans-serif; }
        
        .certificate {
            width: 900px;
            height: 600px;
            background: #fff;
            border: 20px double #d4af37;
            padding: 50px;
            color: #333;
            position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.2);
            box-sizing: border-box;
        }

        /* الشعار والاسم */
        .header { text-align: center; margin-bottom: 40px; }
        .logo-name { font-size: 40px; font-weight: bold; color: #d4af37; margin: 0; }
        .subtitle { font-size: 16px; color: #888; margin-top: 5px; }

        /* المحتوى والمساحات الواسعة */
        .content { font-size: 20px; line-height: 2.5; }
        .blank { border-bottom: 2px solid #d4af37; display: inline-block; width: 60%; margin-bottom: 10px; }
        .long-blank { border-bottom: 2px solid #d4af37; display: block; width: 100%; height: 80px; }

        /* الختم والـ QR */
        .footer-elements { position: absolute; bottom: 50px; width: calc(100% - 100px); display: flex; justify-content: space-between; align-items: flex-end; }
        .seal { width: 120px; height: 120px; border: 3px solid #d4af37; border-radius: 50%; display: flex; justify-content: center; align-items: center; text-align: center; font-size: 12px; color: #d4af37; font-weight: bold; }
        #qrcode { background: #fff; padding: 5px; border: 1px solid #ccc; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

<div class="certificate">
    <div class="header">
        <div class="logo-name">N1MOON</div>
        <div class="subtitle">NOUH AL-MARSHUDI - VISUAL ART</div>
    </div>

    <div class="content">
        <strong>شهادة توثيق وأصالة</strong><br>
        المقتني: <span class="blank"></span><br>
        التاريخ: <span class="blank"></span><br>
        كلمة الفنان:<br>
        <span class="long-blank"></span>
    </div>

    <div class="footer-elements">
        <div id="qrcode"></div>
        <div class="seal">N1MOON<br>CERTIFIED<br>ORIGINAL</div>
    </div>
</div>

<script>
    new QRCode(document.getElementById("qrcode"), { text: "https://n1moon.com", width: 90, height: 90 });
</script>

</body>
</html>
