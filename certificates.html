<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #000; }
        
        .cert-wrapper {
            /* هنا نضع الصورة التي أعجبتك كخلفية */
            background-image: url('certificate-bg.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            width: 1000px; 
            height: 560px;
            position: relative;
        }

        .input-text {
            position: absolute;
            font-family: 'Arial', sans-serif;
            color: #d4af37;
            font-weight: bold;
            font-size: 18px;
        }

        /* أماكن النصوص فوق الصورة (يمكنك تعديل الأرقام لضبط الموقع) */
        .title-pos { top: 385px; right: 280px; }
        .dim-pos { top: 415px; right: 280px; }
        .serial-pos { top: 445px; right: 280px; }
    </style>
</head>
<body>

    <div class="cert-wrapper">
        <div class="input-text title-pos">اسم اللوحة: .......................................</div>
        <div class="input-text dim-pos">الخامات: .......................................</div>
        <div class="input-text serial-pos">N1M-2026-0001</div>
    </div>

</body>
</html>
