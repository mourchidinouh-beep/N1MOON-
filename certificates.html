<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N1MOON | Certificate</title>
    <!-- مكتبة توليد QR Code -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background-color: #000; 
        }
        .cert-wrapper {
            /* هذا الكود يعرض صورتك image.jpg كخلفية */
            background-image: url('image.jpg');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            width: 1000px; 
            height: 560px;
            position: relative;
        }
        .input-text {
            position: absolute;
            font-family: 'Arial', sans-serif;
            color: #d4af37;
            font-weight: bold;
            font-size: 18px;
            text-align: right;
        }
        /* أماكن النصوص فوق الصورة */
        .title-pos { top: 385px; right: 280px; }
        .dim-pos { top: 415px; right: 280px; }
        .serial-pos { top: 445px; right: 280px; }
        
        .back-link {
            position: fixed;
            bottom: 20px;
            color: #ffffff;
            text-decoration: none;
            border: 1px solid #ffffff;
            padding: 10px 20px;
            background: rgba(0,0,0,0.5);
        }
        /* مكان الـ QR Code في اليسار */
        #qrcode { position: absolute; bottom: 30px; left: 30px; width: 100px; height: 100px; }
    </style>
</head>
<body>

    <div class="cert-wrapper">
        <div class="input-text title-pos">اسم اللوحة: ...........................................</div>
        <div class="input-text dim-pos">الخامات والأبعاد: ....................................</div>
        <div class="input-text serial-pos">الرقم التسلسلي: N1M-2026-0001</div>
        
        <!-- مكان الـ QR Code -->
        <div id="qrcode"></div>
    </div>

    <a href="index.html" class="back-link">العودة للرئيسية</a>

    <script>
        // إنشاء الـ QR Code للرابط الخاص بك
        new QRCode(document.getElementById("qrcode"), {
            text: "https://n1moon.com/certificates.html",
            width: 100,
            height: 100,
            colorDark : "#d4af37",
            colorLight : "#000000",
        });
    </script>

</body>
</html>
