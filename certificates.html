<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap');
        body { background: #dcdcdc; display: flex; justify-content: center; padding: 50px; }
        
        .certificate-container {
            width: 800px;
            background: #fff;
            padding: 40px;
            /* هذا هو سر الإطار الذهبي المزدوج الفاخر */
            border: 20px double #b8860b;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            font-family: 'Amiri', serif;
        }

        .header { text-align: center; margin-bottom: 30px; }
        .logo { font-size: 40px; font-weight: bold; color: #8b6508; }
        
        .content { font-size: 18px; line-height: 2; color: #000; }
        .field { border-bottom: 1px solid #b8860b; display: inline-block; width: 300px; }
        
        .footer { display: flex; justify-content: space-between; align-items: flex-end; margin-top: 50px; }
        .seal { width: 80px; height: 80px; border: 2px solid #b8860b; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #b8860b; }
    </style>
</head>
<body>
    <div class="certificate-container">
        <div class="header">
            <div class="logo">N1MOON</div>
            <div style="font-size: 14px; color: #666;">NOUH EL-MORCHIDI - VISUAL ART</div>
        </div>
        <div class="content">
            <p><strong>شهادة توثيق وأصالة | CERTIFICATE OF AUTHENTICITY</strong></p>
            <p>أنا الموقع أدناه، الفنان: نوح المرشدي (N1MOON)</p>
            <p>أشهد بأن العمل الفني هو عمل أصلي ومملوك قانونياً لـ: <span class="field"></span></p>
            <p>وقد تم بيعه وتاريخ تسليمه في: <span class="field"></span></p>
            <p>كلمة الفنان: <span class="field" style="width: 500px;"></span></p>
        </div>
        <div class="footer">
            <div id="qrcode"></div>
            <div class="seal">N1MOON<br>CERTIFIED<br>ORIGINAL</div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>new QRCode(document.getElementById("qrcode"), {text: "https://n1moon.com", width: 60, height: 60});</script>
</body>
</html>
