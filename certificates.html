<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N1MOON | Certificate</title>
    <!-- مكتبة توليد QR Code -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #000; }
        .cert-wrapper { 
            background-image: url('image.jpg'); 
            background-size: contain; background-repeat: no-repeat; background-position: center;
            width: 1000px; height: 560px; position: relative; 
        }
        /* تم رفع الرمز وإبعاده عن الحافة ليصبح في مكان أفضل */
        #qrcode { position: absolute; bottom: 50px; left: 50px; width: 100px; height: 100px; }
    </style>
</head>
<body>

<div class="cert-wrapper">
    <!-- مكان الـ QR Code -->
    <div id="qrcode"></div>
</div>

<script>
    new QRCode(document.getElementById("qrcode"), {
        text: "https://n1moon.com/certificates.html",
        width: 100,
        height: 100,
        colorDark : "#d4af37",
        colorLight : "#000000",
    });
</script>

</body>
</html>
