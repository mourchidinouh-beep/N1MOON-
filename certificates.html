<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background-color: #f0f0f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: sans-serif; }
        
        .certificate {
            width: 700px;
            background: #fff;
            border: 5px double #d4af37;
            padding: 40px;
            color: #333;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .header { text-align: center; margin-bottom: 30px; }
        .logo { font-size: 28px; font-weight: bold; color: #d4af37; }
        .subtitle { font-size: 12px; color: #777; }

        .content { margin-right: 20px; }
        .line { border-bottom: 1px solid #d4af37; width: 300px; display: inline-block; margin-bottom: 10px; }
        
        /* الخط الأفقي الذي يجمع الختم والـ QR */
        .footer-line { 
            display: flex; 
            align-items: center; 
            margin-top: 40px; 
            border-top: 1px solid #d4af37; 
            padding-top: 20px;
            width: 100%;
        }
        .seal { 
            width: 70px; height: 70px; border: 1px solid #d4af37; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 7px; text-align: center; color: #d4af37; margin-left: 20px;
        }
        #qrcode { margin-right: auto; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

<div class="certificate">
    <div class="header">
        <div class="logo">N1MOON</div>
        <div class="subtitle">NOUH AL-MARSHUDI - VISUAL ART</div>
    </div>

    <div class="content">
        <p>شهادة توثيق وأصالة</p>
        <p>المقتني: <span class="line"></span></p>
        <p>التاريخ: <span class="line"></span></p>
        <p>كلمة الفنان:</p>
    </div>

    <div class="footer-line">
        <div class="seal">N1MOON<br>CERTIFIED<br>ORIGINAL</div>
        <div id="qrcode"></div>
    </div>
</div>

<script>
    new QRCode(document.getElementById("qrcode"), { text: "https://n1moon.com", width: 50, height: 50 });
</script>

</body>
</html>
