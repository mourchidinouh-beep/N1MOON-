
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>N1MOON | Engineering & Innovation</title>
    <style>
        /* إعدادات الصفحة الأساسية */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #010810; /* خلفية داكنة جداً */
            color: #e0f7fa; /* لون نص فاتح */
            overflow: hidden;
        }

        /* الخلفية الهندسية الرقمية */
        .tech-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(to right, #021024 1px, transparent 1px),
                linear-gradient(to bottom, #021024 1px, transparent 1px);
            background-size: 60px 60px; /* حجم الشبكة الهندسية */
            mask-image: radial-gradient(circle at 50% 50%, black 40%, transparent 100%);
            z-index: -1;
            opacity: 0.5;
        }

        /* تأثير الإضاءة الخلفية (Nebula) */
        .light-effect {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(0, 188, 212, 0.1) 0%, rgba(1, 8, 16, 0) 70%);
            z-index: -1;
        }

        /* الحاوية الرئيسية للمحتوى */
        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        /* منطقة الشعار */
        .logo-container {
            margin-bottom: 30px;
        }

        /* الأيقونة الهندسية */
        .icon-geo {
            width: 120px;
            height: 120px;
            background: conic-gradient(from 180deg at 50% 50%, #0277bd 0deg, #4fc3f7 180deg, #0277bd 360deg);
            border-radius: 50%;
            mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M50 0 C22.38 0 0 22.38 0 50 s22.38 50 50 50 50-22.38 50-50 S77.62 0 50 0 z M50 90 C27.91 90 10 72.09 10 50 S27.91 10 50 10 s40 17.91 40 40-17.91 40-40 40 z"/><path d="M35 30 L50 45 L65 30 L50 15 Z" fill="white"/><path d="M50 40 L35 55 L50 70 L65 55 Z" fill="white"/></svg>') no-repeat center / contain;
            -webkit-mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M50 0 C22.38 0 0 22.38 0 50 s22.38 50 50 50 50-22.38 50-50 S77.62 0 50 0 z M50 90 C27.91 90 10 72.09 10 50 S27.91 10 50 10 s40 17.91 40 40-17.91 40-40 40 z"/><path d="M35 30 L50 45 L65 30 L50 15 Z" fill="white"/><path d="M50 40 L35 55 L50 70 L65 55 Z" fill="white"/></svg>') no-repeat center / contain;
            margin: 0 auto 20px auto;
            animation: pulse 4s infinite alternate;
        }

        /* اسم العلامة التجارية */
        h1.brand-name {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: 8px;
            margin: 0;
            background: linear-gradient(to right, #e0f7fa, #80deea, #e0f7fa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-transform: uppercase;
        }

        /* النصوص العربية والإنجليزية */
        .slogan-container {
            margin-top: 20px;
        }

        .arabic-text {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 5px;
            color: #b2ebf2;
            letter-spacing: 2px;
        }

        .english-text {
            font-size: 1.2rem;
            color: #80deea;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 300;
        }

        /* تأثير النبض للأيقونة */
        @keyframes pulse {
            0% { box-shadow: 0 0 20px rgba(79, 195, 247, 0.3); }
            100% { box-shadow: 0 0 50px rgba(79, 195, 247, 0.7); }
        }

    </style>
</head>
<body>

    <!-- عناصر الخلفية -->
    <div class="tech-background"></div>
    <div class="light-effect"></div>

    <!-- المحتوى الأساسي -->
    <div class="main-container">
        <div class="logo-container">
            <!-- تم تحويل الأيقونة لشكل هندسي CSS -->
            <div class="icon-geo"></div>
            <h1 class="brand-name">N1MOON</h1>
        </div>
        
        <div class="slogan-container">
            <div class="arabic-text">القمر وبحر</div>
            <div class="english-text">Moon and Sea</div>
        </div>
    </div>

</body>
</html>
