
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            background: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            border: 20px solid #fff; /* إطار هندسي */
        }
        /* قمر هندسي بسيط */
        .moon-geometry {
            width: 100px;
            height: 100px;
            border: 2px solid #fff;
            border-radius: 50%;
            position: relative;
            margin-bottom: 30px;
        }
        .moon-geometry::after {
            content: '';
            position: absolute;
            top: -2px; right: 20px;
            width: 50px; height: 100px;
            background: #000;
            border-radius: 50%;
        }
        h1 { font-size: 3rem; letter-spacing: 15px; margin: 0; text-transform: uppercase; }
        .divider { width: 50px; height: 1px; background: #fff; margin: 20px 0; }
        .btn {
            display: block;
            width: 280px;
            padding: 20px;
            margin: 15px 0;
            border: 1px solid #fff;
            text-align: center;
            text-decoration: none;
            color: #fff;
            font-weight: bold;
            transition: 0.4s;
            text-transform: uppercase;
        }
        .btn:hover { background: #fff; color: #000; }
    </style>
</head>
<body>
    <div class="moon-geometry"></div>
    <h1>N1MOON</h1>
    <div class="divider"></div>
    
    <a href="https://n1moon-shop.fourthwall.com/admin/dashboard/products/eed19357-3394-4512-946e-411df33f3bf1/preview" class="btn">متجر المنتجات</a>
    <a href="https://www.saatchiart.com/nouhart" class="btn">معرض اللوحات</a>
</body>
</html>
