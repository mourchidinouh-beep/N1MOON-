<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N1MOON</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        body { background-color: #000000; color: #ffffff; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .logo-img { max-width: 250px; margin-top: 20px; border-radius: 10px; }
        h1 { letter-spacing: 5px; margin: 10px 0; }
        .subtitle { color: #888; margin-bottom: 30px; }
        .btn { display: block; width: 80%; max-width: 350px; margin: 15px auto; padding: 15px; border: 1px solid #ffffff; color: #ffffff; text-decoration: none; background: transparent; cursor: pointer; transition: 0.3s; font-size: 1em; }
        .btn:hover { background: #ffffff; color: #000000; }

        /* تصميم النوافذ */
        .modal { display: none; position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); overflow-y: auto; padding: 20px; }
        .modal-content { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; max-width: 1000px; margin: 50px auto; }
        .modal-content img { width: 100%; border-radius: 8px; cursor: pointer; border: 1px solid #444; }
        .close-btn { color: #fff; font-size: 3em; position: fixed; top: 10px; right: 30px; cursor: pointer; z-index: 1001; }

        /* نافذة العرض الفردي الاحترافية */
        #full-view-modal { display: none; position: fixed; z-index: 2000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; flex-direction: column; }
        #full-img { max-width: 90%; max-height: 75%; border: 3px solid #fff; border-radius: 10px; }
        .close-overlay { color: #fff; font-size: 1.5em; margin-top: 20px; cursor: pointer; border: 1px solid #fff; padding: 10px 20px; border-radius: 5px; }
        .close-overlay:hover { background: #fff; color: #000; }

        .contact-section { margin-top: 60px; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .footer { color: #444; font-size: 0.8em; margin-top: 40px; }
    </style>
</head>
<body>

    <img src="Logon1moon.png" class="logo-img" alt="N1MOON">
    <h1>N 1 M O O N</h1>
    <div class="subtitle">THE DIGITAL INNER REFLECTION</div>

    <a href="https://n1moon-shop.fourthwall.com/" class="btn">SHOP PRODUCTS | متجر المنتجات</a>
    <a href="https://www.saatchiart.com/nouhart" class="btn">ART GALLERY | معرض اللوحات</a>

            <img src="1782879948443.png" onclick="openFullImage(this.src)" oncontextmenu="return false;">

            <img src="IMG_20260630_232303~2.jpg" onclick="openFullImage(this.src)" oncontextmenu="return false;">
            <img src="IMG_20260629_010318~2.jpg" onclick="openFullImage(this.src)" oncontextmenu="return false;">
            <img src="IMG_20260629_005016~2.jpg" onclick="openFullImage(this.src)" oncontextmenu="return false;">
            <img src="IMG_20260621_002624~2.jpg" onclick="openFullImage(this.src)" oncontextmenu="return false;">
            <img src="IMG_20260619_234330~2.jpg" onclick="openFullImage(this.src)" oncontextmenu="return false;">
            <img src="IMG_20260602_232254~2.jpg" onclick="openFullImage(this.src)" oncontextmenu="return false;">

            <img src="IMG_20260510_031615~2.jpg" onclick="openFullImage(this.src)" oncontextmenu="return false;">
        </div>
    </div>

    <!-- نافذة العرض الفردي مع زر إغلاق صريح -->

        <img id="full-img" src="">
        <div class="close-overlay" onclick="document.getElementById('full-view-modal').style.display='none'">
            CLOSE | إغلاق
        </div>

        function openFullImage(src) {
            document.getElementById('full-img').src = src;

        <div class="contact-item"><a href="mailto:mourchidinouh@gmail.com" style="color:#d3d3d3; text-decoration:none;">mourchidinouh@gmail.com</a></div>

    <div class="footer">© 2026 N1MOON. All rights reserved.</div>

</html>
