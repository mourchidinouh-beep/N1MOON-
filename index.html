<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N1MOON | المتجر والمعرض</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
        
        /* دائرة الشعار - القمر والتقنية */
        .logo { width: 150px; height: 150px; background: #0055FF; border-radius: 50%; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; border: 2px solid #C0C0C0; }
        
        h1 { font-size: 2rem; margin: 10px 0; }
        p { color: #C0C0C0; max-width: 500px; margin-bottom: 30px; }
        
        /* الأزرار باللون الأزرق الكهربائي */
        .btn-container { display: flex; flex-direction: column; gap: 15px; width: 80%; max-width: 300px; }
        .btn { padding: 15px; text-decoration: none; font-weight: bold; border-radius: 5px; transition: 0.3s; color: white; }
        .btn-shop { background: #0055FF; } /* الأزرق الكهربائي */
        .btn-art { border: 1px solid #C0C0C0; } /* الفضي */
        .btn:hover { opacity: 0.8; }
    </style>
</head>
<body>

    <div class="logo">N1MOON</div>
    <h1>N1MOON</h1>
    <p>القمر، البحر، والابتكار التقني. معرضي ومنتجاتي في مكان واحد.</p>
    
    <div class="btn-container">
        <a href="https://n1moon-shop.fourthwall.com/" class="btn btn-shop">متجر المنتجات (Fourthwall)</a>
        <a href="https://www.saatchiart.com/nouhart" class="btn btn-art">المعرض الفني (Saatchi Art)</a>
    </div>

</body>
</html>
