<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N1MOON</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        body { background-color: #000000; color: #ffffff; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .logo-img { max-width: 250px; margin-top: 20px; border-radius: 10px; }
        h1 { letter-spacing: 5px; margin: 10px 0; }
        .subtitle { color: #888; margin-bottom: 30px; }
        .btn { display: block; width: 80%; max-width: 350px; margin: 15px auto; padding: 15px; border: 1px solid #ffffff; color: #ffffff; text-decoration: none; background: transparent; cursor: pointer; transition: 0.3s; font-size: 1em; }
        .btn:hover { background: #ffffff; color: #000000; }

        .modal { display: none; position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); overflow-y: auto; padding: 20px; }
        .modal-content { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; max-width: 1000px; margin: 50px auto; }
        .modal-content img { width: 100%; border-radius: 8px; cursor: pointer; border: 1px solid #444; }
        .close-btn { color: #fff; font-size: 3em; position: fixed; top: 10px; right: 30px; cursor: pointer; z-index: 1001; }

        #full-view-modal { display: none; position: fixed; z-index: 2000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); flex-direction: column; justify-content: center; align-items: center; }
        #full-img { max-width: 90%; max-height: 50%; border: 2px solid #fff; border-radius: 10px; }
        .story-text { color: #fff; width: 85%; margin-top: 20px; font-size: 1.1em; line-height: 1.6; }
        .ar-text { color: #fff; margin-bottom: 10px; }
        .en-text { color: #aaa; font-style: italic; }
        .close-overlay { margin-top: 30px; cursor: pointer; border: 1px solid #fff; padding: 10px 30px; border-radius: 5px; }
        .close-overlay:hover { background: #fff; color: #000; }
    </style>
</head>
<body>

    <img src="Logon1moon.png" class="logo-img" alt="N1MOON">
    <h1>N 1 M O O N</h1>
    <div class="subtitle">THE DIGITAL INNER REFLECTION</div>

    <a href="https://n1moon-shop.fourthwall.com/" class="btn">SHOP PRODUCTS | متجر المنتجات</a>
    <a href="https://www.saatchiart.com/nouhart" class="btn">ART GALLERY | معرض اللوحات</a>
    <div class="btn" onclick="document.getElementById('jacket-modal').style.display='block'">VIEW JACKIE PUFFER | عرض JACKIE</div>
    <div class="btn" onclick="document.getElementById('moon-modal').style.display='block'">LUNAR ASTRONOMY | معرض الفلك القمري</div>

    <!-- معرض الجاكيتات -->
    <div id="jacket-modal" class="modal">
        <span class="close-btn" onclick="this.parentElement.style.display='none'">&times;</span>
        <div class="modal-content">
            <img src="jacket.n1moon1.png" onclick="openFullImage(this.src, 'ياقة (Collar Haut) بهندسة دائرية تحمي عنقك كدائرة من الطاقة.', 'High collar (Collar Haut) with circular geometry protecting your neck like a circle of energy.')" oncontextmenu="return false;">
            <img src="1782879948443.png" onclick="openFullImage(this.src, 'تجسيد للهندسة والدفء. الياقة الدائرية تعطي طاقة ووقاراً يرافقك في كل خطوة.', 'The embodiment of geometry and warmth. Circular collar providing energy and dignity in every step.')" oncontextmenu="return false;">
        </div>
    </div>

    <!-- معرض القمر -->
    <div id="moon-modal" class="modal">
        <span class="close-btn" onclick="this.parentElement.style.display='none'">&times;</span>
        <div class="modal-content">
            <img src="IMG_20260702_231349~2.jpg" onclick="openFullImage(this.src, 'عندما يكتمل القمر، تكتمل الرؤية.', 'When the moon is full, the vision is complete.')" oncontextmenu="return false;">
            <img src="IMG_20260702_231200~2.jpg" onclick="openFullImage(this.src, 'الهلال رمز للأمل، وبداية دورة جديدة.', 'The crescent is a symbol of hope and a new cycle.')" oncontextmenu="return false;">
            <img src="IMG_20260630_232303~2.jpg" onclick="openFullImage(this.src, 'مهما تكاثرت الغيوم، ستظل روحك هي القمر.', 'No matter how many clouds gather, your spirit remains the moon.')" oncontextmenu="return false;">
            <img src="IMG_20260629_010318~2.jpg" onclick="openFullImage(this.src, 'كل ظل على سطح القمر هو تجربة، وكل فوهة هي ذكرى.', 'Every shadow on the moon is an experience, and every crater is a memory.')" oncontextmenu="return false;">
            <img src="IMG_20260629_005016~2.jpg" onclick="openFullImage(this.src, 'ضوء خافت في ليلة عميقة، يذكرنا أن الهدوء قوة.', 'A faint light in a deep night, reminding us that tranquility is strength.')" oncontextmenu="return false;">
            <img src="IMG_20260621_002624~2.jpg" onclick="openFullImage(this.src, 'تأمل في سكون الكون، حيث لا شيء صعب.', 'Meditation in the silence of the universe.')" oncontextmenu="return false;">
            <img src="IMG_20260619_234330~2.jpg" onclick="openFullImage(this.src, 'القمر يراقب الأرض، ونحن نراقب أنفسنا من خلاله.', 'The moon watches the Earth, and we watch ourselves through it.')" oncontextmenu="return false;">
            <img src="IMG_20260602_232254~2.jpg" onclick="openFullImage(this.src, 'جمال في التفاصيل، كما في دقة العمل التقني.', 'Beauty in the details, just like the precision of technical work.')" oncontextmenu="return false;">
            <img src="IMG_20260521_004838~2.jpg" onclick="openFullImage(this.src, 'نور يضيء طريق الإبداع في كل الظروف.', 'Light that illuminates the path of creativity.')" oncontextmenu="return false;">
            <img src="IMG_20260510_031615~2.jpg" onclick="openFullImage(this.src, 'بداية الرحلة، حيث يلتقي العلم بالفن.', 'The beginning of the journey, where science meets art.')" oncontextmenu="return false;">
        </div>
    </div>

    <!-- النافذة الفردية المطورة -->
    <div id="full-view-modal">
        <img id="full-img" src="">
        <div id="image-story" class="story-text"></div>
        <div class="close-overlay" onclick="document.getElementById('full-view-modal').style.display='none'">CLOSE | إغلاق</div>
    </div>

    <script>
        function openFullImage(src, ar, en) {
            document.getElementById('full-img').src = src;
            document.getElementById('image-story').innerHTML = '<div class="ar-text">' + ar + '</div><div class="en-text">' + en + '</div>';
            document.getElementById('full-view-modal').style.display = 'flex';
        }
    </script>

    <div style="margin-top: 60px; display: flex; flex-direction: column; align-items: center; gap: 15px;">

        <a href="mailto:mourchidinouh@gmail.com" style="color:#d3d3d3; text-decoration:none;">mourchidinouh@gmail.com</a>
    </div>

    <div class="footer" style="color: #444; font-size: 0.8em; margin-top: 40px;">© 2026 N1MOON. All rights reserved.</div>
</body>
</html>
