<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N1MOON | الكون والفن</title>
    <style>
        body {
            background-color: #050505;
            color: #d1d1d1;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
            background-image: radial-gradient(circle at center, #1a1a2e 0%, #050505 80%);
        }
        .container {
            background: rgba(20, 20, 25, 0.7);
            padding: 50px 30px;
            border-radius: 30px;
            border: 1px solid #333;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.1);
            width: 85%;
            max-width: 400px;
        }
        h1 {
            font-size: 3rem;
            letter-spacing: 8px;
            color: #fff;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }
        .subtitle {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 18px;
            margin: 20px 0;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.4s ease;
            border: 1px solid #555;
            text-transform: uppercase;
            font-size: 0.9rem;
        }
        .btn-shop { background: #000; color: #00ffcc; border-color: #00ffcc; }
        .btn-shop:hover { background: #00ffcc; color: #000; box-shadow: 0 0 15px #00ffcc; }
        .btn-art { background: #000; color: #fff; border-color: #fff; }
        .btn-art:hover { background: #fff; color: #000; box-shadow: 0 0 15px #fff; }
    </style>
</head>
<body>

<div class="container">
    <h1>N1MOON</h1>
    <p class="subtitle">استكشافات رقمية من أعماق الكون</p>
    
    <!-- ضع رابط متجر Fourthwall الخاص بك هنا بين علامتي التنصيص -->
    <a href="https://fourthwall.com/your-store-link" class="btn btn-shop">متجر المنتجات</a>
    
    <!-- ضع رابط معرض Saatchi Art الخاص بك هنا بين علامتي التنصيص -->
    <a href="https://saatchiart.com/your-profile-link" class="btn btn-art">معرض اللوحات</a>
</div>

</body>
</html>
