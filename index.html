<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            background: #000;
            color: #fff;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        /* خلفية الأشكال الهندسية */
        .geometry-bg {
            position: absolute;
            width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.2;
        }
        .circle { border: 2px solid #fff; border-radius: 50%; position: absolute; }
        .triangle { border-left: 60px solid transparent; border-right: 60px solid transparent; border-bottom: 100px solid #fff; position: absolute; }

        /* القمر الأبيض */
        .moon-full {
            width: 120px;
            height: 120px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 50px #fff;
            margin-bottom: 20px;
        }
        h1 { font-size: 2.5rem; letter-spacing: 15px; margin-bottom: 50px; }
        .btn {
            display: block;
            width: 280px;
            padding: 15px;
            margin: 15px 0;
            border: 1px solid #fff;
            text-align: center;
            text-decoration: none;
            color: #fff;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover { background: #fff; color: #000; }
        .btn span { display: block; font-size: 0.8rem; opacity: 0.7; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="geometry-bg">
        <div class="circle" style="width: 400px; height: 400px; top: 10%; left: 10%;"></div>
        <div class="triangle" style="top: 50%; right: 20%;"></div>
    </div>

    <div class="moon-full"></div>
    <h1>N1MOON</h1>
    
    <a href="https://n1moon-shop.fourthwall.com/admin/dashboard/products/eed19357-3394-4512-946e-411df33f3bf1/preview" class="btn">
        متجر المنتجات
        <span>SHOP PRODUCTS</span>
    </a>
    <a href="https://www.saatchiart.com/nouhart" class="btn">
        معرض اللوحات
        <span>ART GALLERY</span>
    </a>
</body>
</html>
