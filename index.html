
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N1MOON | Digital Reflection</title>
    <style>
        /* تصميم الخلفية والأساس */
        body { background: #000; color: #fff; font-family: 'Arial', sans-serif; text-align: center; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }

        /* حاوية الشعار */
        .logo-container { margin-bottom: 30px; position: relative; width: 250px; height: 250px; display: flex; justify-content: center; align-items: center; }

        /* القمر الهندسي (القلب المتوهج) */
        .logo-img { max-width: 100%; max-height: 100%; filter: drop-shadow(0 0 20px rgba(173, 216, 230, 0.8)); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { filter: drop-shadow(0 0 20px rgba(173, 216, 230, 0.8)); } 50% { filter: drop-shadow(0 0 40px rgba(173, 216, 230, 1)); } 100% { filter: drop-shadow(0 0 20px rgba(173, 216, 230, 0.8)); } }

        /* النص السفلي للشعار */
        .tagline { font-size: 14px; color: #aaa; margin-top: -20px; margin-bottom: 30px; font-weight: 300; letter-spacing: 1px; text-transform: uppercase; }

        /* الأزرار */
        .btn { display: block; width: 80%; max-width: 300px; margin: 15px auto; padding: 18px 20px; border: 2px solid #fff; color: #fff; text-decoration: none; transition: 0.3s; font-weight: bold; text-transform: uppercase; border-radius: 4px; }
        .btn:hover { background: #fff; color: #000; }

        /* قسم التواصل الاجتماعي */
        .social { margin-top: 50px; font-size: 18px; }
        .social a { color: #888; margin: 0 15px; text-decoration: none; transition: 0.3s; }
        .social a:hover { color: #fff; }

        /* مبدل اللغات */
        .lang-switch { margin-top: 20px; font-size: 12px; }
        .lang-switch a { color: #555; margin: 0 5px; text-decoration: none; }
    </style>
</head>
<body>

    <div class="logo-container">
        <!-- هذا هو الشعار الهندسي (image_4.png) -->
        <img src="image_4.png" alt="N1MOON Logo" class="logo-img">
    </div>

    <div class="tagline">THE DIGITAL INNER REFLECTION</div>

    <a href="https://n1moon-shop.fourthwall.com" class="btn">متجر المنتجات / Shop Products</a>
    <a href="https://www.saatchiart.com/nouhart" class="btn">معرض اللوحات / Art Gallery</a>

    <div class="social">
        <a href="#">X</a>
        <a href="#">Email</a>
        <a href="#">Phone</a>
    </div>

    <div class="lang-switch">
        <a href="#" style="color:#fff;">العربية</a> | <a href="#" style="color:#fff;">English</a>
    </div>

</body>
</html>
