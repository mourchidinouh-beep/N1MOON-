<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #010409; /* اللون الأسود العميق */
            color: #ffffff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .n1moon-card {
            text-align: center;
            padding: 20px;
        }
        .logo-icon {
            font-size: 80px; /* حجم أكبر للأيقونة لتفرض حضورها */
            margin-bottom: 20px;
            display: block;
        }
        h1 {
            font-size: 3.5rem;
            letter-spacing: 15px; /* تباعد يعطي فخامة */
            margin: 0;
            font-weight: 300;
        }
        .text-group {
            margin-top: 30px;
        }
        .arabic-text {
            font-size: 1.8rem;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }
        .english-text {
            font-size: 1.2rem;
            letter-spacing: 6px; /* تباعد يعطي طابعاً احترافياً */
            color: #888;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="n1moon-card">
        <div class="logo-icon">💠</div> <!-- استبدلها بالأيقونة الخاصة بك -->
        <h1>N1MOON</h1>
        <div class="text-group">
            <div class="arabic-text">القمر وبحر</div>
            <div class="english-text">Moon and Sea</div>
        </div>
    </div>

</body>
</html>
