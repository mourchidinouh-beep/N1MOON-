<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            background: #000;
            color: #fff;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }
        /* خلفية هندسية */
        .geometry-bg {
            position: absolute;
            width: 100%; height: 100%;
            z-index: -1;
            background-image: radial-gradient(circle, #222 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.3;
        }
        .ring {
            position: absolute;
            border: 1px solid #fff;
            border-radius: 50%;
            opacity: 0.2;
        }
        /* القمر الأبيض */
        .moon-full {
            width: 140px;
            height: 140px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 70px #fff;
            margin-bottom: 30px;
        }
        h1 { font-size: 2.5rem; letter-spacing: 15px; margin-bottom: 40px; }
        .btn {
            display: block;
            width: 320px;
            padding: 22px;
            margin: 20px 0;
            border: 2px solid #fff;
            text-align: center;
            text-decoration: none;
            color: #fff;
            font-weight: bold;
            font-size: 1.1rem;
            transition: 0.4s;
            text-transform: uppercase;
        }
        .btn:hover { background: #fff; color: #000; }
        .btn span { display: block; font-size: 0.8rem; opacity: 0.7; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="geometry-bg"></div>
    <div class="ring" style="width: 500px; height: 500px; top: 15%; left: 20%;"></div>
    <div class="ring" style="width: 700px; height: 700px; top: 5%; left: 10%;"></div>

    <div class="moon-full"></div>
    <h1>N1MOON</h1>
    
    <!-- الرابط الذي طلبته بالضبط -->
    <a href="https://n1moon-shop.fourthwall.com/admin/dashboard/products/eed19357-3394-4512-946e-411df33f3bf1/preview" class="btn">
        متجر المنتجات
        <span>SHOP PRODUCTS</span>
    </a>
    <a href="https://www.saatchiart.com/nouhart" class="btn">
        معرض اللوحات
        <span>ART GALLERY</span>
    </a>
</body>
</html>
