<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N1MOON | Moon and Sea</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; color: #fff; }
        
        .hero {
            height: 100vh;
            background-image: url('1782592807389.png');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background-color: #000;
        }

        h1 { font-size: 3rem; margin-bottom: 30px; text-shadow: 0 0 20px #0055FF; }

        .btn-group { display: flex; flex-direction: column; gap: 15px; width: 250px; }
        
        .btn {
            padding: 15px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            transition: 0.4s;
            cursor: pointer;
            border: 1px solid #0055FF;
            background: rgba(0, 85, 255, 0.2);
            color: white;
        }
        
        .btn:hover { background: #0055FF; }

        #contact-section {
            margin-top: 30px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 10px;
            display: none;
        }

        .contact-item { margin: 10px 0; font-size: 0.9rem; }
    </style>
</head>

    <div class="hero">
        <h1>N1MOON</h1>

        <div id="contact-section">
            <div class="contact-item">📧 mourchidinouh@gmail.com</div>
            <div class="contact-item">📞 0700450691</div>
            <div class="contact-item">💬 <a href="https://wa.me/212700450691" style="color:#0055FF; text-decoration:none;">مراسلة واتساب</a></div>
        </div>
    </div>

</body>
</html>
